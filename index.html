<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alrehla</title>
    <meta name="description" content="منصة الرحلة: قصص أطفال عربية مخصصة وبرامج كتابة إبداعية. نجعل طفلك بطلاً وننمي مواهبه في الكتابة الإبداعية">
    <meta name="keywords" content="قصص أطفال مخصصة, كتابة إبداعية للأطفال, تنمية مواهب, محتوى عربي للأطفال, منصة تربوية">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dvouptrzu/image/upload/v1770036678/alrehla_admin_uploads/xt28mlvglaxaqzxqt8j0.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS - يتم بناؤه محلياً عبر Vite -->
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --card: 0 0% 100%;
        --card-foreground: 222.2 84% 4.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 222.2 84% 4.9%;
        --primary: 222.2 47.4% 11.2%;
        --primary-foreground: 210 40% 98%;
        --secondary: 210 40% 96.1%;
        --secondary-foreground: 222.2 47.4% 11.2%;
        --muted: 210 40% 96.1%;
        --muted-foreground: 215.4 16.3% 46.9%;
        --accent: 210 40% 96.1%;
        --accent-foreground: 222.2 47.4% 11.2%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 210 40% 98%;
        --border: 214.3 31.8% 91.4%;
        --input: 214.3 31.8% 91.4%;
        --ring: 222.2 47.4% 11.2%;
        --radius: 0.5rem;
      }
      
      body {
        font-family: 'Cairo', sans-serif;
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: hsl(var(--secondary)); }
      ::-webkit-scrollbar-thumb { background: hsl(var(--muted-foreground)); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: hsl(var(--foreground)); }
      *:focus-visible { outline: 2px solid hsl(var(--primary)); outline-offset: 2px; border-radius: 2px; }
    </style>
</head>
<body class="bg-muted/50 antialiased">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
